<style>

:root {

  --bdr2: rgba(255, 255, 255, 0.12);

  --grn: #22c55e;

  --grn-bdr: rgba(34, 197, 94, 0.26);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.1);
  --red-bdr: rgba(239, 68, 68, 0.26);
  --amb: #f59e0b;

  --pur-bdr: rgba(168, 85, 247, 0.26);

  --org-bdr: rgba(249, 115, 22, 0.26);

  --dm: 'DM Sans', sans-serif;
}

#modalResultadoTotalCrypto {
  font-family: var(--dm);
  background: var(--bg);
  color: var(--tx1);
  font-size: 13px;
}

#modalResultadoTotalCrypto .modal-content {
  background: var(--s1);
  border: 1px solid var(--bdr2);
  border-radius: 12px;

  flex-direction: column;
}

#modalResultadoTotalCrypto .modal-header {
  padding: 14px 18px;

  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

#modalResultadoTotalCrypto .modal-title {

  font-size: 16px;
  font-weight: 700;

}

#modalResultadoTotalCrypto .modal-header-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

#modalResultadoTotalCrypto .mh-refresh-btn {

  border: 1px solid var(--bdr);
  color: var(--tx2);

}

#modalResultadoTotalCrypto .mh-refresh-btn:hover {

}

/* ─ Topbar (Filtros) ─ */
#modalResultadoTotalCrypto .topbar {

  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
  padding: 9px 18px;

  border-bottom: 1px solid var(--bdr);
  flex-shrink: 0;
  overflow-x: auto;
}

#modalResultadoTotalCrypto .tb-lbl {
  font-size: 0.66rem;
  color: var(--tx2);
  font-family: var(--mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}

#modalResultadoTotalCrypto .tb-sep {
  width: 1px;
  height: 16px;
  background: var(--bdr2);
  flex-shrink: 0;
  margin: 0 4px;
}

#modalResultadoTotalCrypto .chip {
  padding: 0.2rem 0.58rem;
  border-radius: 6px;
  font-size: 0.68rem;
  font-weight: 600;

  color: var(--tx2);

}

#modalResultadoTotalCrypto .chip:hover {

  border-color: var(--bdr2);
}

#modalResultadoTotalCrypto .chip.on {

  color: var(--tx1);
}

#modalResultadoTotalCrypto .main-layout {

  grid-template-columns: 1fr 330px;
  flex: 1;

}

#modalResultadoTotalCrypto .col-left {

  overflow-x: hidden;
}

}

}

#modalResultadoTotalCrypto .col-right {

  background: var(--bg);
}

}

#modalResultadoTotalCrypto .col-right::-webkit-scrollbar-thumb {

  border-radius: 2px;
}

  border-bottom: 1px solid var(--bdr);
}

#modalResultadoTotalCrypto .ciclo-head {
  display: flex;
  align-items: center;

  user-select: none;
}

#modalResultadoTotalCrypto .ciclo-head:hover,
#modalResultadoTotalCrypto .ciclo-head.open {

}

}

}

  border-radius: 12px;
  white-space: nowrap;
}

#modalResultadoTotalCrypto .badge.ex {
  background: var(--org-bg);
  color: var(--org);
  border: 1px solid var(--org-bdr);
}

#modalResultadoTotalCrypto .badge.ab {
  background: var(--grn-bg);
  color: var(--grn);
  border: 1px solid var(--grn-bdr);
}

#modalResultadoTotalCrypto .badge.ops {
  background: var(--s3);
  color: var(--tx2);
  border: 1px solid var(--bdr);
}

#modalResultadoTotalCrypto .ch-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

#modalResultadoTotalCrypto .ch-total {
  font-family: var(--mono);
  font-size: 0.88rem;
  font-weight: 700;
}

#modalResultadoTotalCrypto .ch-arr {
  font-size: 0.68rem;
  color: var(--tx2);
  transition: transform 0.2s;
}

#modalResultadoTotalCrypto .ciclo-head.open .ch-arr {
  transform: rotate(180deg);
}

#modalResultadoTotalCrypto .ciclo-body {
  display: none;
  border-top: 1px solid var(--bdr);
}

#modalResultadoTotalCrypto .ciclo-body.open {

}

}

}

}

}

#modalResultadoTotalCrypto .rp-head-title {

}

#modalResultadoTotalCrypto .rp-body {

#modalResultadoTotalCrypto .dot {

#modalResultadoTotalCrypto .pos {

#modalResultadoTotalCrypto .neg {
