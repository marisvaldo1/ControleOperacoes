[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not live_api"
markers =
    live_api: testes que fazem chamadas HTTP reais a APIs externas (use: pytest -m live_api)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
