<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept 11 - Quant Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1E222D;
            --bg-surface: #262B36;
            --bg-elevated: #2F3542;
            --text-primary: #E1E3E6;
            --text-secondary: #8B929E;
            --text-muted: #5C6370;
            --profit: #4CAF50;
            --loss: #EF5350;
            --accent: #5B8DEF;
            --border: #363C4E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .terminal-card {
            background: var(--bg-surface);
            border-radius: 8px;
            width: 100%;
            max-width: 520px;
            border: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .terminal-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.red { background: #FF5F56; }
        .dot.yellow { background: #FFBD2E; }
        .dot.green { background: #27C93F; }

        .header-title {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .header-title span {
            color: var(--accent);
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--loss);
        }

        .terminal-body {
            padding: 16px;
        }

        .data-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            width: 140px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .data-value {
            flex: 1;
            color: var(--text-primary);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-value .current {
            color: var(--accent);
        }

        .data-value .arrow {
            font-size: 10px;
            margin-left: 8px;
        }

        .arrow.up { color: var(--profit); }
        .arrow.down { color: var(--loss); }

        .section-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .sparkline-container {
            height: 40px;
            margin: 12px 0;
            position: relative;
            background: var(--bg-elevated);
            border-radius: 4px;
            overflow: hidden;
        }

        .sparkline-container svg {
            width: 100%;
            height: 100%;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border-radius: 4px;
            margin: 16px 0;
        }

        .status-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .status-value {
            font-size: 14px;
            font-weight: 600;
        }

        .status-value.winning { color: var(--profit); }
        .status-value.losing { color: var(--loss); }

        .terminal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border);
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timestamp .dot {
            width: 6px;
            height: 6px;
            background: var(--profit);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .sync-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sync-btn:hover {
            background: #4A7ED4;
        }

        .sync-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .sync-btn .spinner {
            display: none;
            animation: spin 1s linear infinite;
        }

        .sync-btn.loading .spinner { display: inline; }
        .sync-btn.loading .btn-text { display: none; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .pnl-display {
            text-align: center;
            padding: 16px;
            background: var(--bg-elevated);
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .pnl-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pnl-value {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
        }

        .pnl-value.green { color: var(--profit); }
        .pnl-value.red { color: var(--loss); }

        .pnl-percent {
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="terminal-card">
            <div class="terminal-header">
                <div class="header-left">
                    <div class="terminal-dots">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                    <div class="header-title">PUT_ANALYSIS <span>::</span> PETR4</div>
                </div>
                <button class="close-btn">×</button>
            </div>

            <div class="terminal-body">
                <div class="pnl-display">
                    <div class="pnl-label">Profit / Loss</div>
                    <div class="pnl-value green" id="pnlValue">R$ 450</div>
                    <div class="pnl-percent" id="pnlPercent">+1.37%</div>
                </div>

                <div class="status-indicator">
                    <span class="status-label">Status</span>
                    <span class="status-value winning" id="statusValue">VENCENDO</span>
                </div>

                <div class="sparkline-container">
                    <svg viewBox="0 0 200 40" preserveAspectRatio="none">
                        <path d="M0,35 Q25,30 50,25 T100,15 T150,10 T200,5"
                              fill="none" stroke="var(--profit)" stroke-width="1.5"/>
                        <path d="M0,35 Q25,30 50,25 T100,15 T150,10 T200,5 L200,40 L0,40 Z"
                              fill="url(#grad)" opacity="0.3"/>
                        <defs>
                            <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--profit)"/>
                                <stop offset="100%" style="stop-color:transparent"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <div class="section-title">// PREÇO OPÇÃO</div>
                <div class="data-row">
                    <span class="data-label">OPENING_PRICE</span>
                    <span class="data-value">
                        <span>0.60</span>
                        <span class="current" id="premioAtual">0.15</span>
                    </span>
                </div>
                <div class="data-row">
                    <span class="data-label">VARIATION</span>
                    <span class="data-value">
                        <span id="varPremio">-75.00%</span>
                        <span class="arrow down">▼</span>
                    </span>
                </div>

                <div class="section-title">// ATIVO OBJETO</div>
                <div class="data-row">
                    <span class="data-label">OPENING_SPOT</span>
                    <span class="data-value">
                        <span>36.00</span>
                        <span class="current" id="ativoAtual">35.80</span>
                    </span>
                </div>
                <div class="data-row">
                    <span class="data-label">VARIATION</span>
                    <span class="data-value">
                        <span id="varAtivo">-0.56%</span>
                        <span class="arrow down">▼</span>
                    </span>
                </div>

                <div class="section-title">// MÉTRICAS</div>
                <div class="data-row">
                    <span class="data-label">STRIKE_PRICE</span>
                    <span class="data-value">34.50</span>
                </div>
                <div class="data-row">
                    <span class="data-label">BREAK_EVEN</span>
                    <span class="data-value">33.90</span>
                </div>
                <div class="data-row">
                    <span class="data-label">DISTANCE</span>
                    <span class="data-value" id="distancia">+3.77%</span>
                </div>
                <div class="data-row">
                    <span class="data-label">PROBABILITY</span>
                    <span class="data-value" id="probValue">75%</span>
                </div>
            </div>

            <div class="terminal-footer">
                <div class="timestamp">
                    <span class="dot"></span>
                    <span>LAST_UPDATE: <span id="timestamp">--:--:--</span></span>
                </div>
                <button class="sync-btn" id="syncBtn" onclick="atualizar()">
                    <span class="spinner">⟳</span>
                    <span class="btn-text">SYNC DATA</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const operacao = {
            strike: 34.50,
            premioAbertura: 0.60,
            premioAtual: 0.15,
            ativoAbertura: 36.00,
            ativoAtual: 35.80,
            quantidade: 1000
        };

        function atualizar() {
            const btn = document.getElementById('syncBtn');
            btn.classList.add('loading');

            setTimeout(() => {
                const variacao = (Math.random() - 0.5) * 0.30;
                operacao.ativoAtual = parseFloat((operacao.ativoAtual + variacao).toFixed(2));
                operacao.premioAtual = Math.max(0.01, parseFloat((operacao.premioAbertura * 0.25 + (Math.random() - 0.5) * 0.05).toFixed(2)));

                atualizarInterface();

                btn.classList.remove('loading');
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString('pt-BR');
            }, 600);
        }

        function atualizarInterface() {
            const distancia = ((operacao.ativoAtual - operacao.strike) / operacao.strike) * 100;
            const probabilidade = Math.min(99, Math.max(20, 75 + (distancia - 3.77) * 5));
            const lucro = (operacao.premioAbertura - operacao.premioAtual) * operacao.quantidade;
            const variacaoPremio = ((operacao.premioAtual - operacao.premioAbertura) / operacao.premioAbertura) * 100;
            const variacaoAtivo = ((operacao.ativoAtual - operacao.ativoAbertura) / operacao.ativoAbertura) * 100;
            const isWinning = probabilidade >= 60;

            // P&L
            const pnlValue = document.getElementById('pnlValue');
            const pnlPercent = document.getElementById('pnlPercent');
            pnlValue.textContent = 'R$ ' + Math.abs(Math.round(lucro));
            pnlValue.className = 'pnl-value ' + (isWinning ? 'green' : 'red');
            pnlPercent.textContent = (isWinning ? '+' : '-') + Math.abs((lucro / (operacao.premioAbertura * operacao.quantidade) * 100)).toFixed(2) + '%';

            // Status
            const statusValue = document.getElementById('statusValue');
            statusValue.textContent = isWinning ? 'VENCENDO' : 'ATENÇÃO';
            statusValue.className = 'status-value ' + (isWinning ? 'winning' : 'losing');

            // Valores
            document.getElementById('premioAtual').textContent = operacao.premioAtual.toFixed(2);
            document.getElementById('varPremio').textContent = variacaoPremio.toFixed(2) + '%';
            document.getElementById('ativoAtual').textContent = operacao.ativoAtual.toFixed(2);
            document.getElementById('varAtivo').textContent = variacaoAtivo.toFixed(2) + '%';
            document.getElementById('distancia').textContent = '+' + distancia.toFixed(2) + '%';
            document.getElementById('probValue').textContent = Math.round(probabilidade) + '%';
        }

        document.getElementById('timestamp').textContent = new Date().toLocaleTimeString('pt-BR');
        atualizarInterface();
    </script>
</body>
</html>
