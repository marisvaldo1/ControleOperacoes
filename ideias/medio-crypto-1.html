<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conceito 1 — Cockpit HUD: Preço Médio Crypto</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333;
  --amber: #e8a830; --blue: #4da6ff; --green: #3fb950;
  --red: #f85149; --purple: #bc8cff; --tx: #e6edf3; --tx2: #8b949e;
  --mono: 'JetBrains Mono','Courier New',monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--tx); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

/* ── Modal Header (padrão do sistema) ── */
.modal-header { background: var(--bg2); border-bottom: 1px solid #30363d; padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: .95rem; font-weight: 700; color: var(--tx); display: flex; align-items: center; gap: 8px; }
.modal-title svg { color: var(--amber); }
.header-meta { display: flex; align-items: center; gap: 12px; }
.ts { font-family: var(--mono); font-size: .72rem; color: var(--tx2); }
.btn-refresh { background: none; border: 1px solid #30363d; border-radius: 6px;
  color: var(--tx2); cursor: pointer; padding: 5px 8px; transition: .2s; }
.btn-refresh:hover { border-color: var(--amber); color: var(--amber); }
.btn-close { background: none; border: none; cursor: pointer; color: var(--tx2); font-size: 1.1rem;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: .2s; }
.btn-close:hover { background: #30363d; color: var(--tx); }

/* ── Body ── */
.body { padding: 16px; background: var(--bg); }

/* ── Asset Tabs ── */
.asset-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.asset-tab { padding: 6px 18px; border-radius: 20px; border: 1.5px solid #30363d; cursor: pointer;
  font-size: .82rem; font-weight: 600; transition: .2s; background: var(--bg2); color: var(--tx2); }
.asset-tab.active-btc { border-color: var(--amber); color: var(--amber); background: rgba(232,168,48,.08); }
.asset-tab.active-eth { border-color: var(--blue); color: var(--blue); background: rgba(77,166,255,.08); }

/* ── Gauge Row ── */
.gauge-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.gauge-card { background: var(--bg2); border: 1px solid #21262d; border-radius: 12px; padding: 16px;
  text-align: center; position: relative; overflow: hidden; }
.gauge-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.gauge-card.c-amber::before { background: var(--amber); }
.gauge-card.c-blue::before { background: var(--blue); }
.gauge-card.c-green::before { background: var(--green); }
.gauge-card.c-red::before { background: var(--red); }
.gauge-label { font-size: .68rem; color: var(--tx2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.gauge-val { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; }
.gauge-sub { font-size: .72rem; color: var(--tx2); margin-top: 4px; }

/* ── PM Hero ── */
.pm-hero { background: var(--bg2); border: 1px solid #30363d; border-radius: 14px; padding: 20px;
  margin-bottom: 14px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; }
.pm-asset-badge { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center;
  justify-content: center; font-family: var(--mono); font-size: 1rem; font-weight: 700; }
.pm-asset-badge.btc { background: rgba(232,168,48,.12); border: 1.5px solid var(--amber); color: var(--amber); }
.pm-asset-badge.eth { background: rgba(77,166,255,.12); border: 1.5px solid var(--blue); color: var(--blue); }
.pm-center { }
.pm-lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--tx2); }
.pm-value { font-family: var(--mono); font-size: 2rem; font-weight: 700; }
.pm-sub { font-size: .78rem; color: var(--tx2); margin-top: 2px; }
.pm-right { text-align: right; }
.pm-status-badge { padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 600; }
.pm-status-badge.safe { background: rgba(63,185,80,.12); border: 1px solid var(--green); color: var(--green); }
.pm-status-badge.risk { background: rgba(248,81,73,.12); border: 1px solid var(--red); color: var(--red); }
.pm-status-badge.warn { background: rgba(232,168,48,.12); border: 1px solid var(--amber); color: var(--amber); }
.pm-pct { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; margin-top: 6px; }

/* ── Distância Progress ── */
.dist-section { background: var(--bg2); border: 1px solid #21262d; border-radius: 12px; padding: 16px;
  margin-bottom: 14px; }
.dist-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--tx2); margin-bottom: 12px; }
.dist-item { margin-bottom: 14px; }
.dist-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.dist-lbl { font-size: .8rem; color: var(--tx); }
.dist-pct { font-family: var(--mono); font-size: .82rem; font-weight: 600; }
.progress-track { height: 8px; background: #21262d; border-radius: 4px; }
.progress-fill { height: 8px; border-radius: 4px; transition: width .5s ease; }
.zone-labels { display: flex; justify-content: space-between; font-size: .65rem; color: var(--tx2); margin-top: 4px; }

/* ── Próxima OP Segura ── */
.next-op { background: var(--bg2); border: 1px solid #21262d; border-radius: 12px; padding: 16px;
  margin-bottom: 14px; }
.next-op-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--tx2); margin-bottom: 12px; }
.strike-zones { display: flex; gap: 8px; }
.strike-zone { flex: 1; padding: 10px; border-radius: 8px; text-align: center; }
.strike-zone.danger { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.3); }
.strike-zone.warn   { background: rgba(232,168,48,.08); border: 1px solid rgba(232,168,48,.3); }
.strike-zone.safe   { background: rgba(63,185,80,.08);  border: 1px solid rgba(63,185,80,.3);  }
.sz-icon { font-size: 1.2rem; margin-bottom: 4px; }
.sz-label { font-size: .65rem; color: var(--tx2); text-transform: uppercase; margin-bottom: 4px; }
.sz-val { font-family: var(--mono); font-size: .82rem; font-weight: 700; }
.sz-desc { font-size: .65rem; margin-top: 2px; }
.strike-zone.danger .sz-val { color: var(--red); }
.strike-zone.warn .sz-val   { color: var(--amber); }
.strike-zone.safe .sz-val   { color: var(--green); }
.strike-zone.danger .sz-desc { color: rgba(248,81,73,.7); }
.strike-zone.warn .sz-desc   { color: rgba(232,168,48,.7); }
.strike-zone.safe .sz-desc   { color: rgba(63,185,80,.7); }

/* ── Chart ── */
.chart-card { background: var(--bg2); border: 1px solid #21262d; border-radius: 12px; padding: 16px; }
.chart-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .8px; color: var(--tx2); margin-bottom: 10px; }

/* ── 2-col layout for lower half ── */
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) {
  .gauge-row { grid-template-columns: 1fr 1fr; }
  .row-2 { grid-template-columns: 1fr; }
  .pm-hero { grid-template-columns: auto 1fr; }
  .pm-right { display: none; }
}
</style>
</head>
<body>
<!-- Modal Header (padrão do sistema) -->
<div class="modal-header">
  <div class="modal-title">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    💰 Preço Médio &amp; Segurança de Operação
  </div>
  <div class="header-meta">
    <span class="ts" id="tsLabel">Atualizado: 07:11</span>
    <button class="btn-refresh" title="Atualizar">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
    </button>
    <button class="btn-close" onclick="history.back()">✕</button>
  </div>
</div>

<div class="body">
  <!-- Asset Tabs -->
  <div class="asset-tabs">
    <button class="asset-tab active-btc" onclick="setAsset('BTC',this)">₿ BTC</button>
    <button class="asset-tab" onclick="setAsset('ETH',this)">Ξ ETH</button>
  </div>

  <!-- PM Hero -->
  <div class="pm-hero" id="pmHero"></div>

  <!-- Gauge Row -->
  <div class="gauge-row" id="gaugeRow"></div>

  <!-- 2-col: Distância + Próxima OP -->
  <div class="row-2">
    <div class="dist-section">
      <div class="dist-title">📊 Distância do PM</div>
      <div id="distContent"></div>
    </div>
    <div class="next-op">
      <div class="next-op-title">🎯 Próxima OP — Zonas de Strike</div>
      <div class="strike-zones" id="strikeZones"></div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card" style="margin-top:12px">
    <div class="chart-title">📈 Evolução dos Prêmios Acumulados</div>
    <div style="height:150px"><canvas id="chtEvo"></canvas></div>
  </div>
</div>

<script>
const ASSETS = {
  BTC: {
    symbol: 'BTC', icon: '₿', colorClass: 'btc',
    accentColor: '#e8a830',
    strikeExercida: 74000,
    cotacao: 71403.68,
    premiosTotal: 56.40,
    pm: 73943.60,          // strikeExercida - premiosTotal
    premiosMes: '$56.40',
    opsTotal: 12,
    winRate: 91.7,
    taeMedia: 94.1,
    // histórico prêmios acumulados por dia
    timeline: [
      { d: 'Mar/11', acc: 2.75 }, { d: 'Mar/12', acc: 5.00 },
      { d: 'Mar/13', acc: 10.52 },{ d: 'Mar/16', acc: 19.14 },
      { d: 'Mar/17', acc: 29.58 },{ d: 'Mar/18', acc: 40.05 },
      { d: 'Mar/19', acc: 48.43 },{ d: 'Mar/20', acc: 53.83 },
      { d: 'Mar/23', acc: 55.24 },{ d: 'Mar/24', acc: 56.82 },
      { d: 'Mar/25', acc: 56.40 },
    ]
  },
  ETH: {
    symbol: 'ETH', icon: 'Ξ', colorClass: 'eth',
    accentColor: '#4da6ff',
    strikeExercida: 2325,
    cotacao: 2192.0,
    premiosTotal: 99.96,
    pm: 2225.04,
    premiosMes: '$99.96',
    opsTotal: 15,
    winRate: 93.3,
    taeMedia: 116.6,
    timeline: [
      { d: 'Mar/06', acc: 1.59 }, { d: 'Mar/11', acc: 3.33 },
      { d: 'Mar/12', acc: 7.42 }, { d: 'Mar/16', acc: 28.22 },
      { d: 'Mar/17', acc: 52.06 },{ d: 'Mar/18', acc: 69.06 },
      { d: 'Mar/19', acc: 76.06 },{ d: 'Mar/20', acc: 84.18 },
      { d: 'Mar/23', acc: 85.68 },{ d: 'Mar/24', acc: 88.76 },
      { d: 'Mar/25', acc: 93.59 },
    ]
  }
};
let current = 'BTC';
let _chart = null;

function fmt(v, dec=2) {
  return v.toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtUsd(v) { return '$' + fmt(v); }
function fmtPct(v, sign=true) { return (sign && v>0?'+':'') + fmt(v, 2) + '%'; }

function setAsset(sym, el) {
  current = sym;
  document.querySelectorAll('.asset-tab').forEach(t => {
    t.classList.remove('active-btc','active-eth');
  });
  el.classList.add(sym === 'BTC' ? 'active-btc' : 'active-eth');
  render(sym);
}

function render(sym) {
  const d = ASSETS[sym];
  const pctVsPm = (d.cotacao - d.pm) / d.pm * 100;
  const pmPctColor = pctVsPm >= 0 ? '#3fb950' : pctVsPm > -5 ? '#e8a830' : '#f85149';
  const statusLabel = pctVsPm >= 0 ? 'ACIMA DO PM' : pctVsPm > -5 ? 'PRÓXIMO AO PM' : 'ABAIXO DO PM';
  const statusClass = pctVsPm >= 0 ? 'safe' : pctVsPm > -5 ? 'warn' : 'risk';

  // PM Hero
  document.getElementById('pmHero').innerHTML = `
    <div class="pm-asset-badge ${d.colorClass}">${d.icon}</div>
    <div class="pm-center">
      <div class="pm-lbl">Preço Médio Efetivo (PM)</div>
      <div class="pm-value" style="color:${d.accentColor}">${fmtUsd(d.pm)}</div>
      <div class="pm-sub">Strike exercida ${fmtUsd(d.strikeExercida)} − ${fmtUsd(d.premiosTotal)} prêmios acumulados</div>
    </div>
    <div class="pm-right">
      <div class="pm-status-badge ${statusClass}">${statusLabel}</div>
      <div class="pm-pct" style="color:${pmPctColor}">${fmtPct(pctVsPm)}</div>
      <div style="font-size:.7rem;color:var(--tx2);margin-top:2px">Cotação vs PM</div>
    </div>`;

  // Gauges
  const pctPm = Math.abs(pctVsPm);
  document.getElementById('gaugeRow').innerHTML = `
    <div class="gauge-card c-amber">
      <div class="gauge-label">Strike Exercida</div>
      <div class="gauge-val" style="color:var(--amber)">${fmtUsd(d.strikeExercida)}</div>
      <div class="gauge-sub">Base do PM</div>
    </div>
    <div class="gauge-card c-blue">
      <div class="gauge-label">Cotação Atual</div>
      <div class="gauge-val" style="color:var(--blue)">${fmtUsd(d.cotacao)}</div>
      <div class="gauge-sub" style="color:${pmPctColor}">${fmtPct(pctVsPm)} vs PM</div>
    </div>
    <div class="gauge-card ${statusClass === 'safe' ? 'c-green' : statusClass === 'warn' ? 'c-amber' : 'c-red'}">
      <div class="gauge-label">Prêmios Acumulados</div>
      <div class="gauge-val" style="color:var(--${statusClass === 'safe' ? 'green' : statusClass === 'warn' ? 'amber' : 'red'})">${fmtUsd(d.premiosTotal)}</div>
      <div class="gauge-sub">${d.opsTotal} operações · ${fmt(d.winRate)}% win</div>
    </div>`;

  // Distância
  const distPm = Math.abs(pctVsPm);
  const distBar = Math.min(distPm / 10 * 100, 100);
  const distColor = distPm < 2 ? '#f85149' : distPm < 5 ? '#e8a830' : '#3fb950';
  document.getElementById('distContent').innerHTML = `
    <div class="dist-item">
      <div class="dist-row">
        <span class="dist-lbl">Cotação vs PM</span>
        <span class="dist-pct" style="color:${distColor}">${fmtPct(pctVsPm)}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${distBar}%;background:${distColor}"></div></div>
      <div class="zone-labels"><span style="color:var(--red)">0% Crítico</span><span style="color:var(--amber)">5%</span><span style="color:var(--green)">10%+ Seguro</span></div>
    </div>
    <div class="dist-item">
      <div class="dist-row">
        <span class="dist-lbl">Win Rate</span>
        <span class="dist-pct" style="color:var(--green)">${fmt(d.winRate)}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${d.winRate}%;background:var(--green)"></div></div>
    </div>
    <div class="dist-item">
      <div class="dist-row">
        <span class="dist-lbl">TAE Médio</span>
        <span class="dist-pct" style="color:var(--purple)">${fmt(d.taeMedia)}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.min(d.taeMedia/200*100,100)}%;background:var(--purple)"></div></div>
    </div>`;

  // Strike Zones
  const pm = d.pm;
  const cot = d.cotacao;
  const dangerMax = pm + pm * 0.005;
  const warnMax   = pm + pm * 0.02;
  document.getElementById('strikeZones').innerHTML = `
    <div class="strike-zone danger">
      <div class="sz-icon">🔴</div>
      <div class="sz-label">Perigo</div>
      <div class="sz-val">abaixo ${fmtUsd(dangerMax)}</div>
      <div class="sz-desc">Margem &lt; 0.5%</div>
    </div>
    <div class="strike-zone warn">
      <div class="sz-icon">🟡</div>
      <div class="sz-label">Atenção</div>
      <div class="sz-val">${fmtUsd(dangerMax)} – ${fmtUsd(warnMax)}</div>
      <div class="sz-desc">Margem 0.5–2%</div>
    </div>
    <div class="strike-zone safe">
      <div class="sz-icon">🟢</div>
      <div class="sz-label">Seguro</div>
      <div class="sz-val">acima ${fmtUsd(warnMax)}</div>
      <div class="sz-desc">Margem &gt; 2%</div>
    </div>`;

  buildChart(d);
}

function buildChart(d) {
  if (_chart) { try { _chart.destroy(); } catch(e){} }
  const ctx = document.getElementById('chtEvo').getContext('2d');
  _chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: d.timeline.map(r => r.d),
      datasets: [{
        label: 'Prêmio Acumulado',
        data: d.timeline.map(r => r.acc),
        borderColor: d.accentColor,
        backgroundColor: d.colorClass === 'btc' ? 'rgba(232,168,48,.12)' : 'rgba(77,166,255,.12)',
        fill: true, tension: .35, borderWidth: 2.5,
        pointBackgroundColor: d.accentColor, pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: c => '$' + c.raw.toFixed(2) } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8b949e', font: { size: 10 }, callback: v => '$'+v } }
      }
    }
  });
}

// Init
const now = new Date();
document.getElementById('tsLabel').textContent = `Atualizado: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
render('BTC');
</script>
</body>
</html>
