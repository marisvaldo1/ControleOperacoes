<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resumo do Investimento - 7 Ideias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111a2c;
      --surface: #1a253b;
      --surface-2: #222f49;
      --line: #314663;
      --txt: #e8f0ff;
      --muted: #9db0ce;
      --ok: #12d18e;
      --warn: #f7c845;
      --danger: #ff5d64;
      --ok-bg: rgba(18, 209, 142, 0.18);
      --warn-bg: rgba(247, 200, 69, 0.2);
      --danger-bg: rgba(255, 93, 100, 0.2);
      --grad: radial-gradient(circle at 8% 12%, #2f4a7b 0%, #17233a 55%, #0f1828 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--txt);
      background: var(--grad);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    h1, h2, h3, .big-number {
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.02em;
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(24, 35, 55, 0.8);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      padding: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input,
    .field select {
      background: #0f1728;
      color: var(--txt);
      border: 1px solid #2f4564;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      width: 100%;
    }

    .quick {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .quick button {
      border: 1px solid #39557b;
      background: #172640;
      color: #c5d6f2;
      padding: 8px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .status-line {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 14px;
    }

    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid transparent;
    }

    .pill.ok {
      color: #0cf2ab;
      border-color: #0cf2ab80;
      background: #0cf2ab1a;
    }

    .pill.warn {
      color: #ffd665;
      border-color: #ffd66580;
      background: #ffd6651f;
    }

    .pill.danger {
      color: #ff7a80;
      border-color: #ff7a8080;
      background: #ff7a801f;
    }

    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 12px;
    }

    .idea {
      border-radius: 14px;
      border: 1px solid var(--line);
      overflow: hidden;
      position: relative;
      transition: transform .2s ease;
    }

    .idea:hover {
      transform: translateY(-2px);
    }

    .idea-head {
      padding: 10px 12px;
      border-bottom: 1px solid #ffffff1f;
      background: #0f1a2c80;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .idea-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .idea-body {
      padding: 14px;
      display: grid;
      gap: 12px;
      min-height: 190px;
    }

    .values-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .kpi {
      background: #0f1a2ccc;
      border: 1px solid #2f4567;
      border-radius: 10px;
      padding: 8px;
    }

    .kpi span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
    }

    .kpi strong {
      font-size: 17px;
    }

    .bar-wrap {
      border: 1px solid #39557b;
      border-radius: 999px;
      height: 16px;
      background: #0f1728;
      position: relative;
      overflow: hidden;
    }

    .bar-segment {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #f35d65 0%, #ffd257 50%, #13c88d 100%);
      opacity: 0.35;
    }

    .marker {
      position: absolute;
      top: -2px;
      width: 4px;
      height: 20px;
      border-radius: 4px;
      background: #67bcff;
      box-shadow: 0 0 0 2px #67bcff44;
    }

    .marker.strike {
      background: #fff;
      box-shadow: 0 0 0 2px #ffffff44;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: #c8d7ee;
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      transform: translateY(1px);
    }

    .ring {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #f35d65 0deg, #ffd257 130deg, #13c88d 360deg);
      display: grid;
      place-items: center;
      margin: 0 auto;
      position: relative;
    }

    .ring::after {
      content: "";
      position: absolute;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #17263e;
      border: 1px solid #355276;
    }

    .ring-label {
      z-index: 1;
      font-weight: 700;
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .thermo {
      height: 14px;
      background: #0f1728;
      border: 1px solid #3a5679;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .thermo .fill {
      height: 100%;
      background: linear-gradient(90deg, #f35d65, #ffd257, #13c88d);
      opacity: .85;
    }

    .thermo .needle {
      width: 6px;
      height: 18px;
      border-radius: 6px;
      background: #fff;
      position: absolute;
      top: -2px;
      transform: translateX(-3px);
    }

    .dial {
      height: 105px;
      position: relative;
      overflow: hidden;
    }

    .dial-arc {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      margin: 0 auto;
      background: conic-gradient(from 180deg, #f35d65 0deg, #ffd257 90deg, #13c88d 180deg, #0000 180deg);
      position: relative;
      top: 10px;
    }

    .dial-arc::after {
      content: "";
      position: absolute;
      inset: 28px;
      border-radius: 50%;
      background: #1a2741;
      border: 1px solid #3b5577;
    }

    .dial-needle {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 3px;
      height: 90px;
      background: #fff;
      transform-origin: bottom center;
      border-radius: 6px;
      box-shadow: 0 0 10px #ffffff88;
    }

    .big-number {
      font-size: 34px;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #ccdbf3;
    }

    .list .line {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed #ffffff22;
      padding-bottom: 4px;
    }

    .idea[data-zone="danger"] { background: linear-gradient(145deg, var(--danger-bg), #1a253b 35%); }
    .idea[data-zone="warn"] { background: linear-gradient(145deg, var(--warn-bg), #1a253b 35%); }
    .idea[data-zone="ok"] { background: linear-gradient(145deg, var(--ok-bg), #1a253b 35%); }

    @media (max-width: 860px) {
      .controls {
        grid-template-columns: repeat(2, minmax(100px, 1fr));
      }

      .values-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1 style="margin:0 0 10px; font-size: 24px;">Resumo do Investimento - Laboratório de Visualizações</h1>
      <div class="controls">
        <div class="field">
          <label for="tipo">Tipo</label>
          <select id="tipo">
            <option value="CALL">CALL</option>
            <option value="PUT" selected>PUT</option>
          </select>
        </div>
        <div class="field">
          <label for="strike">Strike</label>
          <input id="strike" type="number" step="0.01" value="2225.00" />
        </div>
        <div class="field">
          <label for="cotacao">Cotação Atual</label>
          <input id="cotacao" type="number" step="0.01" value="2227.21" />
        </div>
        <div class="field">
          <label for="investido">Investido (US$)</label>
          <input id="investido" type="number" step="0.01" value="2245.66" />
        </div>
        <div class="field">
          <label for="premio">Prêmio (US$)</label>
          <input id="premio" type="number" step="0.01" value="13.53" />
        </div>
      </div>
      <div class="quick">
        <button data-scenario="put-in">PUT em exercício</button>
        <button data-scenario="put-near">PUT zona amarela</button>
        <button data-scenario="put-out">PUT sem exercício</button>
        <button data-scenario="call-in">CALL em exercício</button>
        <button data-scenario="call-near">CALL zona amarela</button>
        <button data-scenario="call-out">CALL sem exercício</button>
      </div>
      <div class="status-line">
        <span class="pill" id="pill"></span>
        <strong id="statusText">-</strong>
        <span id="distanceText" style="color: var(--muted);"></span>
      </div>
    </section>

    <section class="ideas-grid" id="ideas"></section>
  </div>

  <script>
    const ideasContainer = document.getElementById("ideas");
    const tipoEl = document.getElementById("tipo");
    const strikeEl = document.getElementById("strike");
    const cotacaoEl = document.getElementById("cotacao");
    const investidoEl = document.getElementById("investido");
    const premioEl = document.getElementById("premio");
    const pillEl = document.getElementById("pill");
    const statusTextEl = document.getElementById("statusText");
    const distanceTextEl = document.getElementById("distanceText");

    const ideas = [
      { id: 1, title: "Faixa de Exercício com Duplo Marcador", desc: "Regra visual direta em uma régua horizontal." },
      { id: 2, title: "Semáforo + Valor de Distância", desc: "Leitura instantânea de zona com chip grande." },
      { id: 3, title: "Anel de Proximidade do Strike", desc: "Distância ao strike em formato circular." },
      { id: 4, title: "Termômetro de Distância", desc: "Escala contínua com agulha no ponto atual." },
      { id: 5, title: "Mini Radar de Decisão", desc: "Combina distância, risco e prêmio em um painel." },
      { id: 6, title: "Gauge de Zona (Meia Lua)", desc: "Gadget estilo cockpit para leitura rápida." },
      { id: 7, title: "Placar de Regras", desc: "Card textual para decisão sem interpretar gráfico." }
    ];

    function fmt(v) {
      return new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v);
    }

    function getRule(tipo, strike, cotacao) {
      const lowBand = strike * 0.95;
      const highBand = strike * 1.05;

      let zone = "warn";
      let status = "Zona Neutra";

      if (tipo === "CALL") {
        if (cotacao < lowBand) {
          zone = "danger";
          status = "Em exercício";
        } else if (cotacao <= highBand) {
          zone = "warn";
          status = "Perto do strike";
        } else {
          zone = "ok";
          status = "Sem exercício";
        }
      } else {
        if (cotacao > highBand) {
          zone = "danger";
          status = "Em exercício";
        } else if (cotacao >= lowBand) {
          zone = "warn";
          status = "Perto do strike";
        } else {
          zone = "ok";
          status = "Sem exercício";
        }
      }

      const distancePct = ((cotacao - strike) / strike) * 100;
      return { zone, status, lowBand, highBand, distancePct };
    }

    function toPercentOnBand(value, lowBand, highBand) {
      const pct = ((value - lowBand) / (highBand - lowBand)) * 100;
      return Math.max(0, Math.min(100, pct));
    }

    function zoneClass(zone) {
      if (zone === "danger") return "danger";
      if (zone === "warn") return "warn";
      return "ok";
    }

    function zoneText(zone) {
      if (zone === "danger") return "Vermelho";
      if (zone === "warn") return "Amarelo";
      return "Verde";
    }

    function renderIdea(idea, data) {
      const { tipo, strike, cotacao, investido, premio, rule } = data;
      const strikeMarker = toPercentOnBand(strike, rule.lowBand, rule.highBand);
      const currentMarker = toPercentOnBand(cotacao, rule.lowBand, rule.highBand);
      const distAbs = Math.abs(rule.distancePct);
      const direction = rule.distancePct >= 0 ? "+" : "-";

      const base = `
        <article class="idea" data-zone="${rule.zone}">
          <div class="idea-head">
            <h3>${idea.id}. ${idea.title}</h3>
            <span class="pill ${zoneClass(rule.zone)}">${zoneText(rule.zone)}</span>
          </div>
          <div class="idea-body">
            <small style="color:var(--muted)">${idea.desc}</small>
            <div class="values-row">
              <div class="kpi"><span>Strike</span><strong>$ ${fmt(strike)}</strong></div>
              <div class="kpi"><span>Cotação</span><strong>$ ${fmt(cotacao)}</strong></div>
              <div class="kpi"><span>Distância</span><strong>${direction}${distAbs.toFixed(2)}%</strong></div>
            </div>
            __BODY__
          </div>
        </article>`;

      const bodyByIdea = {
        1: `
          <div class="bar-wrap">
            <div class="bar-segment"></div>
            <div class="marker strike" style="left:${strikeMarker}%;" title="Strike"></div>
            <div class="marker" style="left:${currentMarker}%;" title="Cotação"></div>
          </div>
          <div class="legend">
            <span><i class="dot" style="background:#fff"></i>Strike</span>
            <span><i class="dot" style="background:#67bcff"></i>Cotação atual</span>
            <span>Faixa de análise: ${fmt(rule.lowBand)} - ${fmt(rule.highBand)}</span>
          </div>
        `,
        2: `
          <div style="display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;">
            <div style="display:grid;place-items:center;height:92px;border-radius:50%;border:3px solid #ffffff2d;background:#0d1729cc;">
              <div class="big-number">${distAbs.toFixed(1)}%</div>
            </div>
            <div class="list">
              <div class="line"><span>Status</span><strong>${rule.status}</strong></div>
              <div class="line"><span>Tipo</span><strong>${tipo}</strong></div>
              <div class="line"><span>Banda 5%</span><strong>${fmt(rule.lowBand)} a ${fmt(rule.highBand)}</strong></div>
            </div>
          </div>
        `,
        3: `
          <div style="display:flex;gap:14px;align-items:center;justify-content:center;">
            <div class="ring"><div class="ring-label">${distAbs.toFixed(1)}%<br>Distância</div></div>
            <div class="list" style="min-width:160px;">
              <div class="line"><span>Strike</span><strong>${fmt(strike)}</strong></div>
              <div class="line"><span>Cotação</span><strong>${fmt(cotacao)}</strong></div>
              <div class="line"><span>Zona</span><strong>${zoneText(rule.zone)}</strong></div>
            </div>
          </div>
        `,
        4: `
          <div class="thermo">
            <div class="fill" style="width:${currentMarker}%;"></div>
            <div class="needle" style="left:${strikeMarker}%;" title="Strike"></div>
          </div>
          <div class="legend">
            <span>Cotação move o preenchimento</span>
            <span>Agulha branca fixa no strike</span>
          </div>
        `,
        5: `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div class="kpi"><span>Prêmio</span><strong>$ ${fmt(premio)}</strong></div>
            <div class="kpi"><span>Investido</span><strong>$ ${fmt(investido)}</strong></div>
            <div class="kpi"><span>Regra</span><strong>${tipo} ${rule.status}</strong></div>
            <div class="kpi"><span>Distância em $</span><strong>$ ${fmt(cotacao - strike)}</strong></div>
          </div>
          <div class="bar-wrap">
            <div class="bar-segment"></div>
            <div class="marker strike" style="left:${strikeMarker}%;"></div>
            <div class="marker" style="left:${currentMarker}%;"></div>
          </div>
        `,
        6: `
          <div class="dial">
            <div class="dial-arc"></div>
            <div class="dial-needle" style="transform:translateX(-50%) rotate(${(currentMarker * 1.8) - 90}deg);"></div>
          </div>
          <div class="legend">
            <span>Extremo esquerdo = zona crítica</span>
            <span>Centro = strike</span>
            <span>Direita = zona confortável</span>
          </div>
        `,
        7: `
          <div class="list">
            <div class="line"><span>Regra ativa</span><strong>${tipo} - ${rule.status}</strong></div>
            <div class="line"><span>Cotação vs Strike</span><strong>${fmt(cotacao)} vs ${fmt(strike)}</strong></div>
            <div class="line"><span>Distância percentual</span><strong>${direction}${distAbs.toFixed(2)}%</strong></div>
            <div class="line"><span>Cor do fundo</span><strong>${zoneText(rule.zone)}</strong></div>
          </div>
          <div style="padding:10px;border-radius:10px;border:1px dashed #ffffff3b;background:#0f1728b8;">
            ${rule.zone === "danger" ? "Atenção: cenário de exercício detectado." : rule.zone === "warn" ? "Atenção moderada: faixa de proximidade ao strike." : "Condição favorável: fora da zona de exercício."}
          </div>
        `
      };

      return base.replace("__BODY__", bodyByIdea[idea.id]);
    }

    function render() {
      const tipo = tipoEl.value;
      const strike = Number(strikeEl.value || 0);
      const cotacao = Number(cotacaoEl.value || 0);
      const investido = Number(investidoEl.value || 0);
      const premio = Number(premioEl.value || 0);

      if (strike <= 0 || cotacao <= 0) {
        ideasContainer.innerHTML = "<div class='panel'>Informe strike e cotação válidos.</div>";
        return;
      }

      const rule = getRule(tipo, strike, cotacao);

      pillEl.className = `pill ${zoneClass(rule.zone)}`;
      pillEl.textContent = rule.status;
      statusTextEl.textContent = `${tipo} | Fundo ${zoneText(rule.zone)}`;
      distanceTextEl.textContent = `Distância: ${(rule.distancePct >= 0 ? "+" : "") + rule.distancePct.toFixed(2)}% (${fmt(cotacao - strike)})`;

      ideasContainer.innerHTML = ideas
        .map((idea) => renderIdea(idea, { tipo, strike, cotacao, investido, premio, rule }))
        .join("");
    }

    function applyScenario(name) {
      const strike = Number(strikeEl.value || 2225);
      const set = (tipo, cotacaoMult) => {
        tipoEl.value = tipo;
        cotacaoEl.value = (strike * cotacaoMult).toFixed(2);
        render();
      };

      const map = {
        "put-in": () => set("PUT", 1.09),
        "put-near": () => set("PUT", 1.02),
        "put-out": () => set("PUT", 0.90),
        "call-in": () => set("CALL", 0.90),
        "call-near": () => set("CALL", 1.02),
        "call-out": () => set("CALL", 1.09)
      };

      if (map[name]) map[name]();
    }

    [tipoEl, strikeEl, cotacaoEl, investidoEl, premioEl].forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });

    document.querySelectorAll("button[data-scenario]").forEach((btn) => {
      btn.addEventListener("click", () => applyScenario(btn.dataset.scenario));
    });

    render();
  </script>
</body>
</html>
